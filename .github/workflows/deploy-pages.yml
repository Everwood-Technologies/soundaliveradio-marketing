# Deploy Next.js static export to GitHub Pages
# Repo Settings > Pages > Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # Project sites: https://<user>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          rm -rf ./out
          mkdir -p ./out

          # Copy prerendered app output produced by `next build`.
          cp -R ./.next/server/app/. ./out/

          # Copy client bundles referenced by generated HTML.
          mkdir -p ./out/_next
          cp -R ./.next/static ./out/_next/static

          # Copy public assets (if present).
          if [ -d ./public ]; then
            cp -R ./public/. ./out/
          fi

          # Ensure discover media assets are explicitly copied for Pages.
          if [ -d ./public/discover ]; then
            mkdir -p ./out/discover
            cp -R ./public/discover/. ./out/discover/
            test -d ./out/discover
          fi

          # Ensure route paths like /about resolve on static hosting.
          python3 - <<'PY'
          from pathlib import Path

          out = Path("out")
          html_files = list(out.rglob("*.html"))
          skipped = {"index", "404", "_not-found", "_global-error"}

          for html_file in html_files:
              route = html_file.relative_to(out).as_posix()[:-5]  # strip ".html"
              if route in skipped or route.endswith("/index"):
                  continue
              target = out / route / "index.html"
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(html_file.read_bytes())
          PY

          # GitHub Pages serves 404.html for unknown routes.
          if [ -f ./out/_not-found.html ] && [ ! -f ./out/404.html ]; then
            cp ./out/_not-found.html ./out/404.html
          fi

          touch ./out/.nojekyll

          # Fail fast if site output is missing.
          test -f ./out/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
